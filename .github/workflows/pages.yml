name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "assets/brand/wimforge-logo.png"
      - "assets/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate site and generated images
        run: python3 website/tools/check_site.py --repo-root . --require-assets

      - name: Assemble Pages artifact
        shell: bash
        run: |
          mkdir -p _site/assets/brand _site/assets/site
          cp -a website/. _site/
          cp assets/brand/wimforge-logo.png _site/assets/brand/wimforge-logo.png
          cp -a assets/site/. _site/assets/site/
          rm -rf _site/tools

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
